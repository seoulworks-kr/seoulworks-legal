<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Tarot: Seoul Cards — Seoul Works</title>
<meta name="description" content="K-Tarot: Seoul Cards by Seoul Works. Korean-themed tarot reading app.">
<style>
  :root {
    --bg: #1a1a3e;
    --bg-2: #2a2456;
    --ink: #faf8f3;
    --ink-soft: #c5c0d8;
    --accent: #d4a744;
    --magenta: #ff2d95;
    --cyan: #00e5ff;
    --font-serif: Georgia, "Times New Roman", Times, serif;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at top, rgba(255, 45, 149, 0.08), transparent 50%),
      radial-gradient(ellipse at bottom, rgba(0, 229, 255, 0.06), transparent 50%);
    color: var(--ink);
    font-family: var(--font-sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    max-width: 480px;
    width: 100%;
    text-align: center;
    padding: 48px 32px;
  }
  .brand {
    font-family: var(--font-serif);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }
  h1 {
    font-family: var(--font-serif);
    font-size: 52px;
    font-weight: 500;
    line-height: 1.05;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  .subtitle {
    font-family: var(--font-serif);
    font-style: italic;
    color: var(--ink-soft);
    font-size: 20px;
    margin-bottom: 40px;
  }
  .tagline {
    color: var(--ink-soft);
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 48px;
    max-width: 360px;
    margin-left: auto;
    margin-right: auto;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 280px;
    margin: 0 auto;
  }
  .link {
    display: block;
    padding: 14px 24px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(212, 167, 68, 0.3);
    color: var(--ink);
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .link:hover {
    background: rgba(212, 167, 68, 0.1);
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  footer {
    margin-top: 64px;
    font-size: 12px;
    color: var(--ink-soft);
    opacity: 0.6;
    letter-spacing: 0.05em;
  }
  footer a {
    color: var(--ink-soft);
    text-decoration: none;
  }
  @media (max-width: 480px) {
    h1 { font-size: 38px; }
    .card { padding: 32px 20px; }
  }
</style>
</head>
<body>
<div class="card">
  <p class="brand">Seoul Works</p>
  <h1>K-Tarot</h1>
  <p class="subtitle">Seoul Cards</p>
  <p class="tagline">A Korean-themed tarot reading experience.<br>Written in Seoul.</p>

  <div class="links">
    <a href="privacy.html" class="link">Privacy Policy</a>
    <a href="terms.html" class="link">Terms of Service</a>
    <a href="mailto:seoulworks.kr@gmail.com" class="link">Contact</a>
  </div>

  <footer>
    © 2026 Seoul Works &middot; Seoul, South Korea
  </footer>
</div>
</body>
</html>
